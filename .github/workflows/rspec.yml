name: "RSpec"
on:
  - push

jobs:
  tests:
    name: "RSpec"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        gemfile:
          - rails_7_2
          - rails_8
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
      BUNDLE_PATH_RELATIVE_TO_CWD: true
      BUNDLE_WITH: ci
    services:
      db:
        image: postgres:16
        env:
          DATABASE_URL: postgres://filterameter:@localhost:5432/filterameter_test
          POSTGRES_PASSWORD: filterameter
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30
    steps:
      - uses: actions/checkout@master

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: default
          bundler-cache: true

      - name: "RSpec"
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://filterameter:@localhost:5432/filterameter_test
        run: bundle exec rspec --format progress
