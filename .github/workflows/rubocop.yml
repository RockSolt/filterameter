name: RuboCop
on:
  - push

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
      - name: Install RuboCop
        run: |
          gem install bundler --no-document
          gem install rubocop -v 1.85.1 --no-document
          gem install rubocop-packaging -v 0.6 --no-document
          gem install rubocop-rails -v 2.32.0 --no-document
          gem install rubocop-rspec -v 3.9 --no-document
          gem install rubocop-rspec_rails -v 2.32 --no-document
      - name: RuboCop
        run: rubocop
